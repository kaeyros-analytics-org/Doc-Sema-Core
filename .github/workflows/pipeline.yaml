name: CI/CD Pipeline - Documentation Sema Universe

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version_bump:
        description: "Version bump type (if auto-increment)"
        required: false
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

env:
  REGISTRY: ghcr.io
  OWNER: kaeyros-analytics-org
  IMAGE_NAME: doc-sema-core

jobs:
  build-and-push:
    name: Build & Push Documentation Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest version and auto-increment
        if: github.event_name == 'workflow_dispatch'
        id: version
        run: |
          chmod +x .github/scripts/get-version.sh
          .github/scripts/get-version.sh \
            "" \
            "${{ github.event.inputs.version_bump || 'patch' }}"

      - name: Set Git Commit SHA as Tag
        run: echo "IMAGE_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Define version & image tags
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ steps.version.outputs.NEW_VERSION }}"
          else
            VERSION="${{ env.IMAGE_TAG }}"
          fi

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "DOC_IMAGE=${REGISTRY}/${OWNER}/${IMAGE_NAME}:${VERSION}" >> $GITHUB_ENV
          echo "DOC_IMAGE_LATEST=${REGISTRY}/${OWNER}/${IMAGE_NAME}:latest" >> $GITHUB_ENV

          echo "doc:${REGISTRY}/${OWNER}/${IMAGE_NAME}:${VERSION}" > image.txt
          echo "🏷️ Version: $VERSION | 🐳 Image: ${IMAGE_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-info
          path: image.txt

      - name: Authenticate to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.TOKEN }}

      - name: Build & push documentation image (version + latest)
        run: |
          docker build \
            -t ${{ env.DOC_IMAGE }} \
            -t ${{ env.DOC_IMAGE_LATEST }} \
            -f Dockerfile \
            .

          docker push ${{ env.DOC_IMAGE }}
          docker push ${{ env.DOC_IMAGE_LATEST }}

          echo "✅ Images pushed:"
          echo "- ${{ env.DOC_IMAGE }}"
          echo "- ${{ env.DOC_IMAGE_LATEST }}"

      - name: Clean up pipeline images
        if: always()
        run: |
          if [ -f .github/scripts/cleanup-images.sh ]; then
            chmod +x .github/scripts/cleanup-images.sh
            .github/scripts/cleanup-images.sh \
              "${{ env.REGISTRY }}" \
              "${{ env.OWNER }}" \
              "${{ env.IMAGE_NAME }}" \
              "${{ env.DOC_IMAGE }}" \
              "${{ env.DOC_IMAGE_LATEST }}"
          else
            echo "⚠️ Cleanup script not found, skipping cleanup"
          fi

  create-release:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs: build-and-push
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download image info
        uses: actions/download-artifact@v4
        with:
          name: image-info

      - name: Get version from artifact
        id: get_version
        run: |
          VERSION=$(cat image.txt | cut -d':' -f3)
          echo "NEW_VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.NEW_VERSION }}
          name: "Release v${{ steps.get_version.outputs.NEW_VERSION }}"
          generate_release_notes: true
